<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <!-- 引入element-ui样式 -->
    <link rel="stylesheet" href="../static/element-ui/lib/theme-chalk/index.css">
    <!-- 引入vue.js -->
    <script src="../static/js/vue.js"></script>
    <!-- 引入axios.js -->
    <script src="../static/axios/dist/axios.js"></script>
    <!-- 引入element-ui组件库 -->
    <script src="../static/element-ui/lib/index.js"></script>
    <!-- 引入marked用于Markdown解析 (使用CDN，如本地有资源请替换路径) -->
    <script src="../static/marked/marked.min.js"></script>
    <script src="../static/dompurify/dist/purify.min.js"></script>

</head>
<body>

<div id="app">
<!-- 创建vue.js对象的作用域-->
    <!-- 循环取值 v-for-->
    <div style="width: 100%;height: 500px;border: red 2px solid">
        <div v-for="(item, index) in messages">
            [{item.content}]
        </div>
    </div>
    <input type="text" placeholder="请输入问题" v-model="question">
    <br>
    <button type="button" @click="chat">提问</button>
</div>

<script>
    let myApp = new Vue({
        el: '#app',
        delimiters: ['[{', '}]'], // 修改vue取值方式，避免和jinja2模板冲突
        data() {
            return {
                question: null,
                loading: false,
                messages: [
                    {role: 'system', content: '我是qwen3.7-max，有什么可以帮助您的吗😊'}
                ]
            }
        },
        methods: {
            // Markdown 渲染方法
            renderMarkdown(content) {
                if (!content) return '';
                try {
                    return marked.parse(content);
                } catch (e) {
                    return content; // 解析失败时返回原文
                }
            },
            // 滚动到底部
            scrollToBottom() {
                this.$nextTick(() => {
                    const chatBody = this.$refs.chatBody;
                    if (chatBody) {
                        chatBody.scrollTop = chatBody.scrollHeight;
                    }
                });
            },
            // 聊天
            chat() {
                let _this = this;
                // 保存问题、清空问题输入框
                let myQuestion = this.question;
                this.question = null;
                // 去掉空格
                myQuestion = myQuestion ? myQuestion.trim() : '';
                // 判断问题是否有输入
                if (myQuestion === '') {
                    this.$message.warning('请输入问题');
                    return;
                }
                // 添加用户消息和AI占位符
                this.messages.push({role: 'user', content: myQuestion});
                this.messages.push({role: 'assistant', content: '正在思考...'});
                this.loading = true;
                this.scrollToBottom();
                let s = ""; // 存储AI返回的答案
                // 构造请求参数
                let params = new URLSearchParams({
                    question: myQuestion
                })
                // 构造EventSource对象
                let eventSource = new EventSource('http://localhost:8000/chat/chatStream?' + params);

                // 监听事件 --- 连接打开时触发
                eventSource.onopen = (event) => {
                    console.log('连接打开');
                }
                // 监听事件 --- 发生错误时触发
                eventSource.onerror = (event) => {
                    console.log('发生错误');
                    eventSource.close(); // 关闭连接
                }
                // 监听事件 --- 接收到服务器推送的消息时触发
                eventSource.onmessage = (event) => {
                    // 取出数据并且转为js对象
                    let oneData = JSON.parse(event.data);
                    // 判断是否终止内容[DONE]
                    if (oneData.content === '[DONE]') {
                        this.loading = false;
                        eventSource.close(); // 关闭连接
                        return;
                    }
                    // 显示内容
                    s += oneData.content;
                    _this.messages[this.messages.length - 1].content = s;
                }
                // 监听事件 --- 推送结束
                eventSource.onclose = (event) => {
                    console.log('推送结束');
                    eventSource.close(); // 关闭连接
                }
            },
        },
        // 页面加载完成后滚动到底部
        mounted() {
            this.scrollToBottom();
        }
    });
</script>
</body>
</html>

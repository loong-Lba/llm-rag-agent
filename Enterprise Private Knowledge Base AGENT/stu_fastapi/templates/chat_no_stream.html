<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <!-- 引入element-ui样式 -->
    <link rel="stylesheet" href="../static/element-ui/lib/theme-chalk/index.css">
    <!-- 引入vue.js -->
    <script src="../static/js/vue.js"></script>
    <!-- 引入axios.js -->
    <script src="../static/axios/dist/axios.js"></script>
    <!-- 引入element-ui组件库 -->
    <script src="../static/element-ui/lib/index.js"></script>
    <!-- 引入marked用于Markdown解析 (使用CDN，如本地有资源请替换路径) -->
    <script src="../static/marked/marked.min.js"></script>
    <script src="../static/dompurify/dist/purify.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f5f7fa; font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif; }

        /* 主容器 */
        #app { height: 100vh; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }

        /* 头部 */
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #ebeef5; font-size: 18px; font-weight: bold; color: #303133; background: #fff; z-index: 10; }

        /* 消息列表区域 */
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; background: #f9fafb; }

        /* 单条消息行 */
        .message-row { display: flex; margin-bottom: 20px; align-items: flex-start; }
        .message-row.user { flex-direction: row-reverse; }

        /* 头像 */
        .avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; font-weight: bold; }
        .avatar.ai { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin-right: 12px; }
        .avatar.user { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); margin-left: 12px; color: #333; }

        /* 气泡 */
        .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; position: relative; }
        .bubble.ai-bubble { background: #fff; border: 1px solid #e4e7ed; border-top-left-radius: 2px; color: #303133; }
        .bubble.user-bubble { background: #409EFF; color: #fff; border-top-right-radius: 2px; }

        /* Markdown 内容样式 */
        .markdown-body p { margin-bottom: 8px; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
        .markdown-body code { font-family: 'Consolas', 'Monaco', monospace; }
        .markdown-body :not(pre) > code { background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; color: #c7254e; font-size: 13px; }
        .markdown-body ul, .markdown-body ol { padding-left: 20px; margin-bottom: 8px; }
        .markdown-body blockquote { border-left: 4px solid #409EFF; padding-left: 12px; color: #606266; margin: 8px 0; }
        .markdown-body table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .markdown-body th, .markdown-body td { border: 1px solid #e4e7ed; padding: 8px 12px; text-align: left; }
        .markdown-body th { background: #f5f7fa; }
        /* 用户气泡内的markdown颜色适配 */
        .user-bubble .markdown-body :not(pre) > code { background: rgba(255,255,255,0.2); color: #fff; }
        .user-bubble .markdown-body pre { background: rgba(0,0,0,0.2); }
        .user-bubble .markdown-body blockquote { border-left-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.85); }

        /* 底部输入区 */
        .chat-footer { padding: 15px 20px; border-top: 1px solid #ebeef5; background: #fff; display: flex; gap: 10px; align-items: center; }
        .chat-footer .el-input { flex: 1; }

        /* 滚动条美化 */
        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-thumb { background: #c0c4cc; border-radius: 3px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>

<div id="app">
    <!-- 头部 -->
    <div class="chat-header">💬 Qwen3.7-Max Chat</div>

    <!-- 消息列表 -->
    <div class="chat-body" ref="chatBody">
        <div v-for="(item, index) in messages" :key="index"
             class="message-row"
             :class="item.role === 'user' ? 'user' : 'ai'">

            <!-- 头像 -->
            <div class="avatar" :class="item.role === 'user' ? 'user' : 'ai'">
                [{ item.role === 'user' ? '我' : 'AI' }]
            </div>

            <!-- 气泡内容 -->
            <div class="bubble" :class="item.role === 'user' ? 'user-bubble' : 'ai-bubble'">
                <div class="markdown-body" v-html="renderMarkdown(item.content)"></div>
            </div>
        </div>
    </div>

    <!-- 底部输入区 -->
    <div class="chat-footer">
        <el-input
            v-model="question"
            placeholder="请输入问题..."
            @keyup.enter.native="chat"
            clearable>
        </el-input>
        <el-button type="primary" @click="chat" :loading="loading">
            [{ loading ? '思考中...' : '发送' }]
        </el-button>
    </div>
</div>

<script>
    let myApp = new Vue({
        el: '#app',
        delimiters: ['[{', '}]'], // 修改vue取值方式，避免和jinja2模板冲突
        data() {
            return {
                question: null,
                loading: false,
                messages: [
                    { role: 'system', content: '我是qwen3.7-max，有什么可以帮助您的吗😊' }
                ]
            }
        },
        methods: {
            // Markdown 渲染方法
            renderMarkdown(content) {
                if (!content) return '';
                try {
                    return marked.parse(content);
                } catch (e) {
                    return content; // 解析失败时返回原文
                }
            },

            // 滚动到底部
            scrollToBottom() {
                this.$nextTick(() => {
                    const chatBody = this.$refs.chatBody;
                    if (chatBody) {
                        chatBody.scrollTop = chatBody.scrollHeight;
                    }
                });
            },

            chat() {
                // 保存问题、清空问题输入框
                let myQuestion = this.question;
                this.question = null;
                // 去掉空格
                myQuestion = myQuestion ? myQuestion.trim() : '';
                // 判断问题是否有输入
                if (myQuestion === '') {
                    this.$message.warning('请输入问题');
                    return;
                }

                // 添加用户消息和AI占位符
                this.messages.push({ role: 'user', content: myQuestion });
                this.messages.push({ role: 'assistant', content: '正在思考...' });
                this.loading = true;
                this.scrollToBottom();

                // ⚠️ 保持原有请求逻辑不变
                axios({
                    url: 'http://localhost:8000/chat/chatNoStream',
                    method: 'get',
                    params: {
                        question: myQuestion,
                    }
                }).then(res => {
                    this.messages[this.messages.length - 1].content = res.data.data;
                }).catch(err => {
                    this.messages[this.messages.length - 1].content = '❌ 请求失败，请检查后端服务是否启动。';
                    console.error(err);
                }).finally(() => {
                    this.loading = false;
                    this.scrollToBottom();
                });
            },
        },
        // 页面加载完成后滚动到底部
        mounted() {
            this.scrollToBottom();
        }
    });
</script>
</body>
</html>
